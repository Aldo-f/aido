site_name: AIdo
site_description: Local API key rotation proxy for LLM providers
site_author: Aldo

repo_url: https://github.com/Aldo-f/aido
repo_name: Aldo-f/aido

dev_addr: '127.0.0.1:8000'

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Providers: providers.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

copyright: >
  &copy; 2024 Aldo
