name: Build AIDO

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            executable: aido
          - os: macos-latest
            target: macos
            executable: aido
          - os: windows-latest
            target: windows
            executable: aido.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name aido aido.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aido-${{ matrix.target }}
          path: dist/${{ matrix.executable }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            artifacts/aido-linux/aido
            artifacts/aido-macos/aido
            artifacts/aido-windows/aido.exe
          generateReleaseNotes: true
